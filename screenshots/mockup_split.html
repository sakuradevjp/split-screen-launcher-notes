<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Split mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", "Hiragino Sans", "Noto Sans JP", "Noto Sans KR", "Noto Sans SC", "Noto Sans TC", "Noto Sans Arabic", "Noto Sans Devanagari", "Noto Sans Thai", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #1f1f1f;
  }

  /* The "phone" frame, 1080x2400 (Pixel-ish 9:20). Capture-target. */
  #phone {
    width: 1080px;
    height: 2400px;
    background: #000;
    position: relative;
    overflow: hidden;
    color: #1f1f1f;
  }

  /* Status bar */
  .status-bar {
    height: 80px;
    background: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 36px;
    font-weight: 600; font-size: 28px;
    color: #1f1f1f;
  }
  .status-bar .icons { display: flex; gap: 14px; align-items: center; }
  .status-bar svg { width: 36px; height: 36px; fill: #1f1f1f; }

  /* The split-screen surfaces */
  .surface {
    width: 100%;
    height: 1110px; /* (2400 - 80 status - 80 nav - 20 divider) / 2 */
    overflow: hidden;
    position: relative;
  }
  .divider {
    width: 100%;
    height: 20px;
    background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .divider .handle {
    width: 96px;
    height: 6px;
    background: rgba(255,255,255,0.55);
    border-radius: 3px;
  }

  /* ─── TOP: Google Maps style mockup ─── */
  .maps {
    background: linear-gradient(180deg, #c5e1b8 0%, #b7d6e8 70%, #cad9d3 100%);
    position: relative;
  }
  /* Roads/streets - simple lines */
  .maps .road {
    position: absolute;
    background: #ffffff;
    box-shadow: 0 0 0 2px #d4d4d4;
  }
  .maps .road.h1 { top: 320px; left: -60px; right: -60px; height: 16px; transform: rotate(-3deg); }
  .maps .road.h2 { top: 660px; left: -60px; right: -60px; height: 14px; transform: rotate(2deg); }
  .maps .road.h3 { top: 880px; left: -60px; right: -60px; height: 22px; transform: rotate(-1deg); }
  .maps .road.v1 { left: 240px; top: -30px; bottom: -30px; width: 14px; transform: rotate(8deg); }
  .maps .road.v2 { left: 720px; top: -30px; bottom: -30px; width: 18px; transform: rotate(-6deg); }
  .maps .park {
    position: absolute;
    background: #b9dba0;
    border-radius: 24px;
  }
  .maps .park.p1 { top: 380px; left: 280px; width: 360px; height: 240px; transform: rotate(-2deg); }
  .maps .water {
    position: absolute;
    background: #aacfe8;
    border-radius: 50% 30% 50% 40%;
  }
  .maps .water.w1 { top: 720px; left: -100px; width: 400px; height: 320px; }

  /* Map pin */
  .maps .pin {
    position: absolute;
    width: 56px; height: 72px;
    transform: translate(-50%, -100%);
  }
  .maps .pin.red::before {
    content: "";
    position: absolute;
    inset: 0;
    background: #EA4335;
    clip-path: path("M28 0 C12 0 0 12 0 28 C0 48 28 72 28 72 C28 72 56 48 56 28 C56 12 44 0 28 0 Z");
  }
  .maps .pin.red::after {
    content: "";
    position: absolute;
    top: 16px; left: 16px;
    width: 24px; height: 24px;
    background: #fff; border-radius: 50%;
  }
  .maps .pin.p1 { top: 580px; left: 540px; }

  /* Search bar at top of Maps */
  .maps .search {
    position: absolute;
    top: 28px; left: 28px; right: 28px;
    height: 100px;
    background: #fff;
    border-radius: 50px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    display: flex; align-items: center; padding: 0 28px;
    gap: 22px;
  }
  .maps .search .g {
    width: 56px; height: 56px;
    background: conic-gradient(from 0deg, #4285F4, #EA4335, #FBBC05, #34A853, #4285F4);
    border-radius: 50%;
    position: relative;
  }
  .maps .search .g::after {
    content: ""; position: absolute; inset: 8px; background: #fff; border-radius: 50%;
  }
  .maps .search .g::before {
    content: "G"; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 28px; color: #4285F4;
    z-index: 1;
  }
  .maps .search .text { flex: 1; font-size: 32px; color: #5f6368; font-weight: 400; }
  .maps .search .mic {
    width: 48px; height: 48px;
    background: #4285F4;
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z'/></svg>") no-repeat center / contain;
            mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z'/></svg>") no-repeat center / contain;
  }
  .maps .search .avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #FBBC05, #EA4335);
  }

  /* Category chips */
  .maps .chips {
    position: absolute;
    top: 156px; left: 28px; right: 28px;
    display: flex; gap: 14px; flex-wrap: nowrap; overflow: hidden;
  }
  .maps .chip {
    background: #fff;
    border-radius: 50px;
    padding: 14px 24px;
    font-size: 26px; color: #202124; font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .maps .chip .ic {
    width: 28px; height: 28px;
    background: currentColor; opacity: 0.85;
    -webkit-mask: var(--ic) no-repeat center / contain;
            mask: var(--ic) no-repeat center / contain;
  }
  .maps .chip.restaurant { color: #f48b30; }
  .maps .chip.restaurant .ic { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z'/></svg>"); }
  .maps .chip.hotel { color: #4285F4; }
  .maps .chip.hotel .ic { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z'/></svg>"); }
  .maps .chip.attraction { color: #00897B; }
  .maps .chip.attraction .ic { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z'/></svg>"); }

  /* Place card at bottom */
  .maps .place-card {
    position: absolute;
    left: 28px; right: 28px; bottom: 28px;
    background: #fff;
    border-radius: 28px;
    padding: 24px 28px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  }
  .maps .place-card .title {
    font-size: 30px; font-weight: 700; color: #202124; margin-bottom: 6px;
  }
  .maps .place-card .meta {
    font-size: 22px; color: #5f6368;
  }
  .maps .place-card .meta .stars { color: #f9ab00; }

  /* Floating compass / direction button (right side) */
  .maps .fab {
    position: absolute;
    right: 32px; bottom: 220px;
    width: 96px; height: 96px;
    background: #1a73e8;
    border-radius: 50%;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
  }
  .maps .fab svg { width: 50px; height: 50px; fill: #fff; }

  /* ─── BOTTOM: YouTube style mockup ─── */
  .yt {
    background: #0f0f0f;
    color: #fff;
    position: relative;
  }
  .yt .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 92px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
  }
  .yt .top-bar .logo {
    display: flex; align-items: center; gap: 4px;
    font-size: 28px; font-weight: 600;
  }
  .yt .top-bar .logo .play {
    width: 56px; height: 38px;
    background: #ff0000;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .yt .top-bar .logo .play::after {
    content: "";
    width: 0; height: 0;
    border-left: 14px solid #fff;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    margin-left: 4px;
  }
  .yt .top-bar .icons { display: flex; gap: 22px; align-items: center; }
  .yt .top-bar .icons div {
    width: 40px; height: 40px;
    background: #fff;
    -webkit-mask: var(--ic) no-repeat center / contain;
            mask: var(--ic) no-repeat center / contain;
  }
  .yt .top-bar .icons .cast { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M21 3H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11z'/></svg>"); }
  .yt .top-bar .icons .bell { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z'/></svg>"); }
  .yt .top-bar .icons .search { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z'/></svg>"); }

  /* Big video thumbnail */
  .yt .thumb {
    position: absolute;
    top: 124px; left: 0; right: 0;
    height: 540px;
    background: linear-gradient(135deg, #2b1f5b 0%, #c83064 50%, #ff8a3d 100%);
    overflow: hidden;
  }
  .yt .thumb::after {
    /* subtle radial highlight */
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.18), transparent 55%);
  }
  .yt .thumb .duration {
    position: absolute; right: 24px; bottom: 24px;
    background: rgba(0,0,0,0.85);
    color: #fff; font-size: 22px; font-weight: 600;
    padding: 8px 14px; border-radius: 8px;
  }
  .yt .thumb .play-overlay {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 140px; height: 140px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .yt .thumb .play-overlay::after {
    content: "";
    width: 0; height: 0;
    border-left: 44px solid #fff;
    border-top: 28px solid transparent;
    border-bottom: 28px solid transparent;
    margin-left: 12px;
  }

  /* Video info row */
  .yt .info {
    position: absolute;
    top: 700px; left: 28px; right: 28px;
    display: flex; gap: 22px;
  }
  .yt .info .ch-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #50c8ff, #6a3aff);
    flex-shrink: 0;
  }
  .yt .info .text { flex: 1; }
  .yt .info .title {
    font-size: 32px; font-weight: 600; line-height: 1.3;
    color: #fff; margin-bottom: 10px;
  }
  .yt .info .meta {
    font-size: 24px; color: #aaa;
  }

  /* Suggested row */
  .yt .suggested {
    position: absolute;
    top: 920px; left: 28px; right: 28px;
    display: flex; gap: 18px;
  }
  .yt .suggested .item { flex: 1; }
  .yt .suggested .item .t {
    width: 100%; height: 170px;
    border-radius: 14px;
  }
  .yt .suggested .item:nth-child(1) .t { background: linear-gradient(135deg, #1a3a5c, #4caf50); }
  .yt .suggested .item:nth-child(2) .t { background: linear-gradient(135deg, #6a1b9a, #f8bbd0); }
  .yt .suggested .item .lbl {
    margin-top: 12px;
    font-size: 22px; color: #fff; font-weight: 500;
    line-height: 1.3;
  }

  /* Nav bar at very bottom */
  .nav-bar {
    height: 80px;
    background: #000;
    display: flex; align-items: center; justify-content: space-around;
  }
  .nav-bar div {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.85);
    -webkit-mask: var(--ic) no-repeat center / contain;
            mask: var(--ic) no-repeat center / contain;
  }
  .nav-bar .back { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M15 4l-8 8 8 8 1.4-1.4L9.8 12l6.6-6.6z'/></svg>"); }
  .nav-bar .home { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><circle cx='12' cy='12' r='9'/></svg>"); }
  .nav-bar .recent { --ic: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='4' y='4' width='16' height='16' rx='1' fill='none' stroke='currentColor' stroke-width='3'/></svg>");
                       background: none;
                       border: 4px solid rgba(255,255,255,0.85);
                       border-radius: 4px;
                       width: 36px; height: 36px;
  }

</style>
</head>
<body>
<div id="phone">
  <!-- Status bar -->
  <div class="status-bar">
    <span data-i18n="time">12:34</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M12 21l-3-3-3 3v-5l3-3 3 3z"/><path d="M3 9h18v2H3z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M2 22h20V2z"/></svg>
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/></svg>
    </div>
  </div>

  <!-- TOP: Maps -->
  <div class="surface maps">
    <div class="road h1"></div>
    <div class="road h2"></div>
    <div class="road h3"></div>
    <div class="road v1"></div>
    <div class="road v2"></div>
    <div class="park p1"></div>
    <div class="water w1"></div>
    <div class="pin red p1"></div>

    <div class="search">
      <div class="g"></div>
      <div class="text" data-i18n="map_search">Search here</div>
      <div class="mic"></div>
      <div class="avatar"></div>
    </div>

    <div class="chips">
      <div class="chip restaurant"><span class="ic"></span><span data-i18n="chip_restaurant">Restaurants</span></div>
      <div class="chip hotel"><span class="ic"></span><span data-i18n="chip_hotel">Hotels</span></div>
      <div class="chip attraction"><span class="ic"></span><span data-i18n="chip_attraction">Sights</span></div>
    </div>

    <div class="fab">
      <svg viewBox="0 0 24 24"><path d="M21.7 11.29L12.7 2.29c-.39-.39-1.02-.39-1.41 0l-9 9c-.39.39-.39 1.02 0 1.41l9 9c.39.39 1.02.39 1.41 0l9-9c.39-.38.39-1.01 0-1.41zM14 14.5V12h-4v3H8v-4c0-.55.45-1 1-1h5V7.5l3.5 3.5-3.5 3.5z"/></svg>
    </div>

    <div class="place-card">
      <div class="title" data-i18n="place_name">Riverside Cafe</div>
      <div class="meta">
        <span class="stars">★★★★★</span>
        <span data-i18n="place_meta">4.6 · 2 min</span>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider"><div class="handle"></div></div>

  <!-- BOTTOM: YouTube -->
  <div class="surface yt">
    <div class="top-bar">
      <div class="logo">
        <div class="play"></div>
      </div>
      <div class="icons"><div class="cast"></div><div class="bell"></div><div class="search"></div></div>
    </div>

    <div class="thumb">
      <div class="play-overlay"></div>
      <div class="duration">12:48</div>
    </div>

    <div class="info">
      <div class="ch-avatar"></div>
      <div class="text">
        <div class="title" data-i18n="video_title">A perfect afternoon ride</div>
        <div class="meta" data-i18n="video_meta">Coastal Routes · 124K views</div>
      </div>
    </div>

    <div class="suggested">
      <div class="item">
        <div class="t"></div>
        <div class="lbl" data-i18n="suggest1">Mountain pass tour</div>
      </div>
      <div class="item">
        <div class="t"></div>
        <div class="lbl" data-i18n="suggest2">Sunset along the bay</div>
      </div>
    </div>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <div class="back"></div>
    <div class="home"></div>
    <div class="recent"></div>
  </div>
</div>
</body>
</html>
